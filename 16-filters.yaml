- name: discuss on filter topics
  hosts: local
  connection: local
  vars:
    topics: Linux, Ansible, Shell, Git, AWS
    tagMap:
      name: Ansible
      project: roboshop
      environment: dev
  tasks:
  - name: filter topics
    debug: 
      msg: " Topics are: {{ topics | split(',') }}"
    
  - name: default filter
    debug:
      msg: " Hi {{ GREETING | default('Good Morning')}} "
    
  - name: map to list
    debug:
      msg: "{{ tagMap | dict2items }}"